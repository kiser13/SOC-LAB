# Hardened kernel parameters
# ==============================================================================
# KERNEL HARDENING PARAMETERS (99-sysctl.conf)
# ==============================================================================

# 1. IP Forwarding (Disable unless the machine is a router)
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# 2. IP Spoofing Protection (Reverse Path Filtering)
# Forces the kernel to verify the source IP of packets
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# 3. ICMP Redirect Protection (Prevents MITM attacks)
# Do not accept or send ICMP redirects (used to alter routing tables)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# 4. SYN Flood Protection
# Helps mitigate Denial of Service (DoS) attacks
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 2048
net.ipv4.tcp_synack_retries = 2

# 5. Source Routing Protection
# Do not accept source-routed packets (often used for malicious traffic)
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# 6. Kernel Hardening & Logging
# Restrict dmesg access to root only (prevents info leaks)
kernel.dmesg_restrict = 1
# Prevent core dumps of setuid programs
fs.suid_dumpable = 0
# Hide kernel pointers (makes exploitation harder)
kernel.kptr_restrict = 2
